# Project identification (self-hosted SonarQube — host passed on CLI)
sonar.projectKey=tech-demo-ui
sonar.projectName=tech-demo-ui

# Source directory to scan
sonar.sources=src

# Directories / files to exclude
sonar.exclusions=ci/**,node_modules/**,dist/**,**/*.test.js,**/*.spec.js,src/api/generated/**/*

# Language and TS config
sonar.language=ts
sonar.typescript.tsconfigPath=tsconfig.json

sonar.sourceEncoding=UTF-8
