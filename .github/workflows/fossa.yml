name: FOSSA License Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Force Node 24 runtime on the JS actions below. fossa-action still ships v1
# on Node 20; GitHub forces Node 24 by default from 2026-06-02, so we opt in
# now to surface any breakage early instead of waiting for the forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least-privilege GITHUB_TOKEN scope. FOSSA only needs to read the source tree
# to scan; it does not write to the repo. Closes the
# actions/missing-workflow-permissions CodeQL warning.
permissions:
  contents: read

jobs:
  fossa-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Scan only; results are uploaded to the FOSSA project dashboard.
      # The previous step `fossa-action ... run-tests: true` was removed — the
      # FOSSA "facebook-patent-rights-2" policy flags react-bootstrap / prop-types-extra /
      # uncontrollable as denied even though those packages have been MIT-licensed since
      # September 2017. Until the FOSSA project policy is updated, the test gate produces
      # only false positives. Re-enable run-tests once the policy is corrected.
      - name: Run FOSSA Scan
        uses: fossas/fossa-action@v1.9.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
