# Project identification (self-hosted SonarQube — host passed on CLI)
sonar.projectKey=tech-demo-api
sonar.projectName=tech-demo-api

# Sources / tests
sonar.sources=src/main
sonar.tests=src/test,src/integration-test

# Compiled outputs (required for Java analysis)
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Coverage (JaCoCo XML report — produced by mvn test, see pom.xml)
sonar.coverage.jacoco.xmlReportPaths=target/jacoco-report/jacoco.xml

# Exclusions
sonar.exclusions=target/**,**/generated/**

sonar.sourceEncoding=UTF-8
