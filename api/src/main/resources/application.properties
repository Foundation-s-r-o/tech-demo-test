# =============================================================================
# Local development configuration — embedded H2 (file-mode), no Docker.
# Fast local iteration is the priority. Production target is PostgreSQL, added
# later via a dedicated 'prod' profile (see docs/UPGRADE_PLAN.md, Phase 9).
# Keep the dialect/datasource profile-overridable and migrations portable.
# =============================================================================

# --- Web server ---
server.port=8082

# --- Datasource: H2 file-mode (persists across restarts under ./data) ---
spring.datasource.url=jdbc:h2:file:./data/techdemo;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hikari connection pool
spring.datasource.hikari.maximum-pool-size=16
spring.datasource.hikari.idle-timeout=28000
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
spring.datasource.hikari.auto-commit=false

# H2 web console (dev convenience): http://localhost:8082/h2-console
spring.h2.console.enabled=true

# --- JPA / Hibernate ---
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
# Flyway owns the schema; Hibernate only validates it.
spring.jpa.hibernate.ddl-auto=validate
# Entities use explicit uppercase @Table/@Column names — preserve them verbatim.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Unquoted identifiers — portable across H2 and PostgreSQL (avoids case-sensitive
# quoted columns). Migrations and @Column names must stay consistent with this.
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.table=flyway_schema_history
spring.flyway.validate-on-migrate=true

# --- Logging (logback-spring.xml is auto-detected by Spring Boot) ---

# --- Actuator ---
management.endpoints.web.exposure.include=*
management.metrics.export.prometheus.enabled=true
# management.endpoints.web.exposure.include=health,info,metrics,prometheus
